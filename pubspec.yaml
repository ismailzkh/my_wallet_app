name: my_wallet_app
description: A personal wallet and expense tracker Flutter app.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0

  cupertino_icons: ^1.0.8
  excel: ^4.0.2
  path_provider: ^2.1.3
  shared_preferences: ^2.2.0
  fl_chart: ^0.68.0
  flutter_local_notifications: ^17.2.1
  pdf: ^3.10.8
  share_plus: ^10.0.2
  animate_do: ^3.3.4       # For those liquid OKX-style animations
  google_fonts: ^6.2.1     # To get professional typography without manual assets
  font_awesome_flutter: ^10.7.0 # For better "Exchange" icons

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/